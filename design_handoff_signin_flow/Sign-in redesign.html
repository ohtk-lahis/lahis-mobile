<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>OHTK · Sign-in flow</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="variants/shared.jsx"></script>
  <script type="text/babel" src="variants/VariantC.jsx"></script>
  <script type="text/babel" src="variants/ServerGate.jsx"></script>

  <script type="text/babel">
    const PHONE_W = 360;
    const PHONE_H = 720;

    function PhoneShell({ children }) {
      return (
        <div style={{
          width: PHONE_W, height: PHONE_H,
          background: '#fff', position: 'relative', overflow: 'hidden',
          fontFamily: 'Inter, system-ui, sans-serif',
        }}>
          <div style={{
            position: 'absolute', top: 0, left: 0, right: 0, height: 28,
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            padding: '0 14px', fontSize: 12, fontWeight: 600,
            color: 'rgba(255,255,255,0.95)', zIndex: 5,
            mixBlendMode: 'difference', pointerEvents: 'none',
          }}>
            <span>9:30</span>
            <span style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
              <svg width="14" height="10" viewBox="0 0 14 10" fill="currentColor"><path d="M0 8h2v2H0zM4 5h2v5H4zM8 2h2v8H8zM12 0h2v10h-2z"/></svg>
              <svg width="14" height="10" viewBox="0 0 14 10" fill="none" stroke="currentColor" strokeWidth="1.2"><rect x="0.6" y="2" width="11" height="6" rx="1"/><rect x="2" y="3.5" width="6.5" height="3" fill="currentColor"/><rect x="12" y="3.5" width="1.5" height="3" rx="0.5" fill="currentColor"/></svg>
            </span>
          </div>
          <div style={{ width: '100%', height: '100%', paddingTop: 28 }}>
            {children}
          </div>
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas>
          <DCSection
            id="gate"
            title="First launch · Setup"
            subtitle="Language and Server are co-equal. Continue stays disabled until both are picked."
          >
            <DCArtboard id="gate-locked" label="Locked (no selections)" width={PHONE_W} height={PHONE_H}>
              <PhoneShell><ServerGate variant="C" selected={null} lang={null} /></PhoneShell>
            </DCArtboard>
            <DCArtboard id="gate-lang" label="Language picked" width={PHONE_W} height={PHONE_H}>
              <PhoneShell><ServerGate variant="C" selected={null} lang="th" /></PhoneShell>
            </DCArtboard>
            <DCArtboard id="gate-ready" label="Both picked · Continue ready" width={PHONE_W} height={PHONE_H}>
              <PhoneShell><ServerGate variant="C" selected="th-moph" lang="th" /></PhoneShell>
            </DCArtboard>
          </DCSection>

          <DCSection
            id="overview"
            title="Sign-in entry"
            subtitle="What the user lands on after the gate."
          >
            <DCArtboard id="C" label="Sign-in" width={PHONE_W} height={PHONE_H}>
              <PhoneShell><VariantC /></PhoneShell>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
